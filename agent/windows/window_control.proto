syntax = "proto3";

package winp.agent.v1;

message Empty {}

message HealthResponse {
  bool ok = 1;
  string message = 2;
  int64 timestamp = 3;
}

message WindowRect {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
}

message WindowInfo {
  uint32 window_id = 1;
  string title = 2;
  uint32 pid = 3;
  WindowRect rect = 4;
  bool visible = 5;
  bool minimized = 6;
  bool maximized = 7;
  int32 z_order = 8;
  int32 monitor_id = 9;
  int64 timestamp = 10;
}

message StreamWindowsRequest {
  uint32 interval_ms = 1;
}

message WindowEvent {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    UPSERT = 1;
    REMOVE = 2;
  }
  Type type = 1;
  WindowInfo window = 2;
  uint32 window_id = 3;
}

message MoveResizeRequest {
  uint32 window_id = 1;
  int32 x = 2;
  int32 y = 3;
  int32 width = 4;
  int32 height = 5;
}

message FocusRequest {
  uint32 window_id = 1;
}

message CloseRequest {
  uint32 window_id = 1;
}

message ControlResponse {
  bool ok = 1;
  string message = 2;
}

service WindowControlService {
  rpc Health(Empty) returns (HealthResponse);
  rpc StreamWindows(StreamWindowsRequest) returns (stream WindowEvent);
  rpc MoveResize(MoveResizeRequest) returns (ControlResponse);
  rpc Focus(FocusRequest) returns (ControlResponse);
  rpc Close(CloseRequest) returns (ControlResponse);
}
